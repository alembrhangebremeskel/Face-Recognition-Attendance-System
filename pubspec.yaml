name: attendance_app
description: "Professional Face Recognition Attendance System for MIT"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # --- UI & State Management ---
  # Using provider for AttendanceViewModel access
  provider: ^6.1.1
  cupertino_icons: ^1.0.6
  intl: ^0.19.0

  # --- AI & Image Processing ---
  # Core for face recognition logic
  camera: ^0.11.0
  google_mlkit_face_detection: ^0.13.0
  tflite_flutter: ^0.10.0
  image: ^4.1.3

  # --- Sensors & Location ---
  # Essential for "Geofencing" (Ensuring user is at the location)
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.1

  # --- Data Persistence ---
  # SQLite for the hybrid-database implementation
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # --- Networking ---
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # CRITICAL: Ensure these folders actually exist in your project root
  assets:
    - assets/
    - assets/mobile_face_net.tflite