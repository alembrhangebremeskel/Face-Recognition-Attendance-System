name: attendance_app
description: "Professional Face Recognition Attendance System for MIT"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # --- UI & State Management ---
  provider: ^6.1.1
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

  # --- Firebase & Real-time Database ---
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.12

  # --- AI & Image Processing ---
  camera: ^0.11.4
  google_mlkit_face_detection: ^0.13.2
  tflite_flutter: ^0.10.4
  image: ^4.1.3

  # --- Sensors & Location ---
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.4.0

  # --- Data Persistence ---
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # --- Networking ---
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

# --- ICON CONFIGURATION ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  # Using the dark teal from your UI for a professional adaptive look
  adaptive_icon_background: "#002B21"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/mobilefacenet.tflite