# Reduce memory to a stable 2GB to prevent JVM crashes on your laptop
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Enable AndroidX support (Required for Firebase and Camera)
android.useAndroidX=true
android.enableJetifier=true

# Speed up builds by running tasks in parallel
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# Optimization for Kotlin and specialized builds
kotlin.code.style=official